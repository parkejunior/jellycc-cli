# Configuração de conversão inteligente para o CLI

container: "mkv"

video:
  target: "h264_8bit"

audio:
  # Formatos que consideramos ideais e NÃO precisam de conversão
  acceptable:
    - aac
    - eac3
    - flac
  
  # Regras de conversão se o codec original não estiver na lista acima
  mappings:
    ac3:
      target: "eac3"
    dts:
      target: "eac3"
    alac:
      target: "flac"
    default:
      target: "aac"